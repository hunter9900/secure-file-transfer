<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO TRANSFER | Secure Download</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --matrix-green: #00ff41; }
        body {
            background: linear-gradient(135deg, #050805 0%, #0a0f0a 100%);
            color: var(--matrix-green);
            font-family: 'Share Tech Mono', monospace;
        }
        .card {
            background: rgba(10, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--matrix-green);
            border-radius: 1rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #000;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-12 max-w-2xl">
        <div class="card p-8 text-center">
            <div class="text-5xl mb-4">🛡️</div>
            <h1 class="text-2xl font-bold mb-4" style="font-family: 'Orbitron', monospace;">SECURE_DOWNLOAD</h1>
            
            <div id="fileInfo" class="mb-6 p-4 border border-green-500/30 rounded-lg">
                <p class="font-mono">>_ PREPARING_SECURE_DOWNLOAD...</p>
            </div>
            
            <button id="downloadBtn" class="btn-primary disabled:opacity-50" disabled>⬇️ DOWNLOAD FILE ⬇️</button>
            
            <p class="text-xs opacity-50 mt-4 font-mono">█▓▒░ ENCRYPTED_TRANSFER ░▒▓█</p>
        </div>
    </div>

    <script>
        const CLOUD_NAME = 'dmskjzsi1';
        const urlParams = new URLSearchParams(window.location.search);
        const fileId = urlParams.get('id');
        
        const fileInfo = document.getElementById('fileInfo');
        const downloadBtn = document.getElementById('downloadBtn');
        
        if (!fileId) {
            fileInfo.innerHTML = '<p class="text-red-400">>_ ERROR: INVALID_DOWNLOAD_LINK</p>';
        } else {
            fileInfo.innerHTML = `
                <p class="mb-2">>_ FILE_ID: ${fileId.substring(0, 20)}...</p>
                <p class="mb-2">>_ STATUS: READY</p>
                <p>>_ ENCRYPTION: AES-256</p>
            `;
            downloadBtn.disabled = false;
            
            downloadBtn.addEventListener('click', () => {
                const downloadUrl = `https://res.cloudinary.com/${CLOUD_NAME}/raw/upload/fl_attachment/${fileId}`;
                window.open(downloadUrl, '_blank');
                fileInfo.innerHTML += '<p class="text-green-400 mt-2">>_ DOWNLOAD_INITIATED</p>';
            });
        }
    </script>
</body>
</html>
