<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO TRANSFER | Authentication Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #0a0f0a;
        }
        
        body.matrix-theme {
            background: linear-gradient(135deg, #050805 0%, #0a0f0a 100%);
            color: var(--matrix-green);
            font-family: 'Share Tech Mono', monospace;
        }
        
        body.light-theme {
            background: linear-gradient(135deg, #f5f5f5 0%, #e0e0e0 100%);
            color: #1a1a1a;
            font-family: 'Orbitron', monospace;
        }
        
        .card {
            background: rgba(10, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.2);
        }
        
        .light-theme .card {
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid #333;
        }
        
        .input-field {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-family: monospace;
        }
        
        .light-theme .input-field {
            background: white;
            border: 1px solid #ccc;
            color: #333;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #000;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        
        .light-theme .btn-primary {
            background: linear-gradient(135deg, #1a1a1a 0%, #333 100%);
            color: white;
        }
        
        .glow-text {
            text-shadow: 0 0 10px var(--matrix-green);
        }
    </style>
</head>
<body class="matrix-theme">
    <div class="container mx-auto px-4 py-12 max-w-md">
        <!-- Theme Toggle -->
        <div class="flex justify-end mb-4 gap-2">
            <button id="themeDark" class="px-3 py-1 rounded text-sm bg-green-900/50">🌙 DARK</button>
            <button id="themeLight" class="px-3 py-1 rounded text-sm">☀️ LIGHT</button>
        </div>
        
        <!-- Main Card -->
        <div class="card rounded-2xl p-8">
            <div class="text-center mb-6">
                <div class="text-4xl mb-2">🔐</div>
                <h1 class="text-2xl font-bold glow-text" style="font-family: 'Orbitron', monospace;">AUTHENTICATION</h1>
                <p class="text-xs opacity-70 mt-2">SECURE_ACCESS_PROTOCOL v1.0</p>
            </div>
            
            <!-- Tab Switcher -->
            <div class="flex gap-2 mb-6">
                <button id="loginTab" class="flex-1 py-2 rounded border border-green-500 bg-green-500/20">LOGIN</button>
                <button id="waitingTab" class="flex-1 py-2 rounded border border-green-500">WAITING LIST</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4">
                    <label class="block mb-2 text-sm">EMAIL_ADDRESS:</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="user@example.com">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm">PASSWORD:</label>
                    <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
                </div>
                <button id="loginBtn" class="btn-primary">🔓 LOGIN</button>
                <p class="text-center text-xs mt-4 opacity-70">
                    Don't have access? Join the waiting list above.
                </p>
            </div>
            
            <!-- Waiting List Form -->
            <div id="waitingForm" class="hidden">
                <div class="mb-4">
                    <label class="block mb-2 text-sm">EMAIL_ADDRESS:</label>
                    <input type="email" id="waitingEmail" class="input-field" placeholder="user@example.com">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm">FULL_NAME:</label>
                    <input type="text" id="waitingName" class="input-field" placeholder="John Doe">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm">WHY_DO_YOU_NEED_ACCESS?:</label>
                    <textarea id="waitingReason" rows="3" class="input-field" placeholder="I need to share sensitive files securely..."></textarea>
                </div>
                <button id="joinWaitingBtn" class="btn-primary">📝 JOIN WAITING LIST</button>
            </div>
            
            <!-- Message Area -->
            <div id="messageArea" class="mt-4 hidden">
                <div id="messageText" class="text-sm text-center p-3 rounded"></div>
            </div>
        </div>
        
        <div class="mt-6 text-center text-xs opacity-50 font-mono">
            <p>█▓▒░ INVITE_ONLY_SYSTEM ░▒▓█ | █▓▒░ WAITING_LIST_ENABLED ░▒▓█</p>
        </div>
    </div>

    <script>
        // ========== THEME HANDLER ==========
        function setTheme(theme) {
            if (theme === 'dark') {
                document.body.classList.remove('light-theme');
                document.body.classList.add('matrix-theme');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('matrix-theme');
                document.body.classList.add('light-theme');
                localStorage.setItem('theme', 'light');
            }
        }
        
        const savedTheme = localStorage.getItem('theme') || 'dark';
        setTheme(savedTheme);
        
        document.getElementById('themeDark').addEventListener('click', () => setTheme('dark'));
        document.getElementById('themeLight').addEventListener('click', () => setTheme('light'));
        
        // ========== TAB SWITCHING ==========
        const loginTab = document.getElementById('loginTab');
        const waitingTab = document.getElementById('waitingTab');
        const loginForm = document.getElementById('loginForm');
        const waitingForm = document.getElementById('waitingForm');
        
        loginTab.addEventListener('click', () => {
            loginTab.classList.add('bg-green-500/20');
            waitingTab.classList.remove('bg-green-500/20');
            loginForm.classList.remove('hidden');
            waitingForm.classList.add('hidden');
        });
        
        waitingTab.addEventListener('click', () => {
            waitingTab.classList.add('bg-green-500/20');
            loginTab.classList.remove('bg-green-500/20');
            loginForm.classList.add('hidden');
            waitingForm.classList.remove('hidden');
        });
        
        // ========== SUPABASE SETUP ==========
        // These values come from Netlify environment variables
        const SUPABASE_URL = window.VITE_SUPABASE_URL || 'https://heijzhvqyfjrhcmxagxs.supabase.co';
        const SUPABASE_ANON_KEY = window.VITE_SUPABASE_ANON_KEY || 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlaWp6aHZxeWZqcmhjbXhhZ3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODQzMzIsImV4cCI6MjA5MTE2MDMzMn0.BRnW1xP8rXuat4D4HWKxvN0a_5UurauVnNVJorvVAoo';
        
        // For now, let's use localStorage for demo (will connect to real Supabase next)
        // This allows us to test the interface first
        
        function showMessage(message, isError = false) {
            const messageArea = document.getElementById('messageArea');
            const messageText = document.getElementById('messageText');
            messageText.textContent = message;
            messageText.className = isError ? 'text-red-400' : 'text-green-400';
            messageArea.classList.remove('hidden');
            setTimeout(() => {
                messageArea.classList.add('hidden');
            }, 5000);
        }
        
        // Login handler (demo version - will connect to Supabase in next step)
        document.getElementById('loginBtn').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please enter email and password', true);
                return;
            }
            
            // For now, show demo message
            showMessage('⚠️ Supabase connection pending. This is a demo. Real authentication coming next!', false);
        });
        
        // Waiting list handler
        document.getElementById('joinWaitingBtn').addEventListener('click', async () => {
            const email = document.getElementById('waitingEmail').value;
            const name = document.getElementById('waitingName').value;
            const reason = document.getElementById('waitingReason').value;
            
            if (!email || !name) {
                showMessage('Please enter email and name', true);
                return;
            }
            
            showMessage('✓ Added to waiting list! You will be notified when access is available.', false);
            
            // Clear form
            document.getElementById('waitingEmail').value = '';
            document.getElementById('waitingName').value = '';
            document.getElementById('waitingReason').value = '';
        });
    </script>
</body>
</html>
