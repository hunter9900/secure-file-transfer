<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO TRANSFER | Admin Panel</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --matrix-green: #00ff41; }
        body {
            background: linear-gradient(135deg, #050805 0%, #0a0f0a 100%);
            color: var(--matrix-green);
            font-family: 'Share Tech Mono', monospace;
        }
        .card {
            background: rgba(10, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--matrix-green);
            border-radius: 1rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #000;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-danger {
            background: linear-gradient(135deg, #ff0040 0%, #cc0033 100%);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
        }
        .table-row {
            border-bottom: 1px solid rgba(0, 255, 65, 0.2);
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <!-- Header -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold glow-text" style="font-family: 'Orbitron', monospace;">⟁ ADMIN PANEL</h1>
                <p id="adminEmail" class="text-sm opacity-70 mt-1">>_ LOADING...</p>
            </div>
            <div class="flex gap-3">
                <a href="/secure-file-transfer/" class="btn-primary">📤 UPLOAD</a>
                <button id="logoutBtn" class="border border-green-500 px-4 py-2 rounded">🚪 LOGOUT</button>
            </div>
        </div>
        
        <!-- Tabs -->
        <div class="flex gap-2 mb-6">
            <button id="usersTab" class="px-4 py-2 rounded border border-green-500 bg-green-500/20">👥 USERS</button>
            <button id="waitingTab" class="px-4 py-2 rounded border border-green-500">📝 WAITING LIST</button>
            <button id="filesTab" class="px-4 py-2 rounded border border-green-500">📁 FILES</button>
        </div>
        
        <!-- Users Section -->
        <div id="usersSection" class="card p-6">
            <h2 class="text-xl font-bold mb-4">>_ REGISTERED_USERS</h2>
            <div id="usersList" class="space-y-2">
                <p class="text-center opacity-50 py-8">Loading users...</p>
            </div>
        </div>
        
        <!-- Waiting List Section -->
        <div id="waitingSection" class="card p-6 hidden">
            <h2 class="text-xl font-bold mb-4">>_ WAITING_LIST</h2>
            <div id="waitingList" class="space-y-2">
                <p class="text-center opacity-50 py-8">Loading waiting list...</p>
            </div>
        </div>
        
        <!-- Files Section -->
        <div id="filesSection" class="card p-6 hidden">
            <h2 class="text-xl font-bold mb-4">>_ ALL_UPLOADS</h2>
            <div id="filesList" class="space-y-2">
                <p class="text-center opacity-50 py-8">Loading files...</p>
            </div>
        </div>
    </div>

    <script>
        // Supabase config
        const supabaseUrl = 'https://heijzhvqyfjrhcmxagxs.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlaWp6aHZxeWZqcmhjbXhhZ3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODQzMzIsImV4cCI6MjA5MTE2MDMzMn0.BRnW1xP8rXuat4D4HWKxvN0a_5UurauVnNVJorvVAoo';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        
        let currentUser = null;
        
        // Check admin access
        async function checkAdmin() {
            const userJson = localStorage.getItem('neo_user');
            if (!userJson) {
                window.location.href = '/secure-file-transfer/login.html';
                return;
            }
            
            currentUser = JSON.parse(userJson);
            
            if (currentUser.role !== 'admin') {
                alert('Access Denied: Admin privileges required');
                window.location.href = '/secure-file-transfer/';
                return;
            }
            
            document.getElementById('adminEmail').innerHTML = `>_ ADMIN: ${currentUser.email}`;
            
            loadUsers();
            loadWaitingList();
            loadFiles();
        }
        
        // Load all users
        async function loadUsers() {
            const { data, error } = await supabaseClient
                .from('users')
                .select('*')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('usersList');
            
            if (error || !data || data.length === 0) {
                container.innerHTML = '<p class="text-center opacity-50 py-8">No users found</p>';
                return;
            }
            
            container.innerHTML = data.map(user => `
                <div class="table-row flex justify-between items-center">
                    <div>
                        <p class="font-bold">${user.email}</p>
                        <p class="text-xs opacity-50">${user.full_name || 'No name'} | Role: ${user.role} | Status: ${user.status}</p>
                    </div>
                    <div class="flex gap-2">
                        <select id="role-${user.id}" class="bg-black/50 border border-green-500 rounded px-2 py-1 text-sm">
                            <option value="user" ${user.role === 'user' ? 'selected' : ''}>User</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Admin</option>
                        </select>
                        <select id="status-${user.id}" class="bg-black/50 border border-green-500 rounded px-2 py-1 text-sm">
                            <option value="active" ${user.status === 'active' ? 'selected' : ''}>Active</option>
                            <option value="suspended" ${user.status === 'suspended' ? 'selected' : ''}>Suspended</option>
                        </select>
                        <button onclick="updateUser('${user.id}')" class="btn-primary text-sm px-3 py-1">Update</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Load waiting list
        async function loadWaitingList() {
            const { data, error } = await supabaseClient
                .from('waiting_list')
                .select('*')
                .order('position', { ascending: true });
            
            const container = document.getElementById('waitingList');
            
            if (error || !data || data.length === 0) {
                container.innerHTML = '<p class="text-center opacity-50 py-8">No pending requests</p>';
                return;
            }
            
            container.innerHTML = data.map(entry => `
                <div class="table-row flex justify-between items-center">
                    <div>
                        <p class="font-bold">${entry.email}</p>
                        <p class="text-xs opacity-50">${entry.name || 'No name'} | Position: #${entry.position}</p>
                    </div>
                    <div>
                        <button onclick="approveUser('${entry.email}', '${entry.name}')" class="btn-primary text-sm px-3 py-1">✅ Approve</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Load all files
        async function loadFiles() {
            const { data, error } = await supabaseClient
                .from('files')
                .select('*')
                .order('created_at', { ascending: false });
            
            const container = document.getElementById('filesList');
            
            if (error || !data || data.length === 0) {
                container.innerHTML = '<p class="text-center opacity-50 py-8">No files uploaded</p>';
                return;
            }
            
            container.innerHTML = data.map(file => `
                <div class="table-row flex justify-between items-center">
                    <div>
                        <p class="font-bold">${file.original_name}</p>
                        <p class="text-xs opacity-50">Owner: ${file.owner_email || 'Unknown'} | Size: ${formatBytes(file.size)} | Downloads: ${file.download_count || 0}</p>
                    </div>
                    <div>
                        <button onclick="deleteFile('${file.file_id}')" class="btn-danger text-sm px-3 py-1">🗑️ Delete</button>
                    </div>
                </div>
            `).join('');
        }
        
        // Update user role/status
        window.updateUser = async (userId) => {
            const newRole = document.getElementById(`role-${userId}`).value;
            const newStatus = document.getElementById(`status-${userId}`).value;
            
            const { error } = await supabaseClient
                .from('users')
                .update({ role: newRole, status: newStatus })
                .eq('id', userId);
            
            if (error) {
                alert('Update failed: ' + error.message);
            } else {
                alert('User updated successfully');
                loadUsers();
            }
        };
        
        // Approve user from waiting list
        window.approveUser = async (email, name) => {
            // Generate random password
            const tempPassword = Math.random().toString(36).substring(2, 10);
            const hashedPassword = await hashPassword(tempPassword);
            
            // Add to users table
            const { error } = await supabaseClient
                .from('users')
                .insert([{
                    email: email,
                    password_hash: hashedPassword,
                    full_name: name,
                    status: 'active',
                    role: 'user'
                }]);
            
            if (error) {
                alert('Failed to approve user: ' + error.message);
                return;
            }
            
            // Remove from waiting list
            await supabaseClient
                .from('waiting_list')
                .delete()
                .eq('email', email);
            
            alert(`User approved! Temporary password: ${tempPassword}\nTell them to change it after login.`);
            loadUsers();
            loadWaitingList();
        };
        
        // Delete file
        window.deleteFile = async (fileId) => {
            if (!confirm('Delete this file? This action cannot be undone.')) return;
            
            const { error } = await supabaseClient
                .from('files')
                .delete()
                .eq('file_id', fileId);
            
            if (error) {
                alert('Delete failed: ' + error.message);
            } else {
                alert('File deleted');
                loadFiles();
            }
        };
        
        // Helper functions
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Tab switching
        document.getElementById('usersTab').addEventListener('click', () => {
            document.getElementById('usersSection').classList.remove('hidden');
            document.getElementById('waitingSection').classList.add('hidden');
            document.getElementById('filesSection').classList.add('hidden');
            document.getElementById('usersTab').classList.add('bg-green-500/20');
            document.getElementById('waitingTab').classList.remove('bg-green-500/20');
            document.getElementById('filesTab').classList.remove('bg-green-500/20');
        });
        
        document.getElementById('waitingTab').addEventListener('click', () => {
            document.getElementById('usersSection').classList.add('hidden');
            document.getElementById('waitingSection').classList.remove('hidden');
            document.getElementById('filesSection').classList.add('hidden');
            document.getElementById('usersTab').classList.remove('bg-green-500/20');
            document.getElementById('waitingTab').classList.add('bg-green-500/20');
            document.getElementById('filesTab').classList.remove('bg-green-500/20');
            loadWaitingList();
        });
        
        document.getElementById('filesTab').addEventListener('click', () => {
            document.getElementById('usersSection').classList.add('hidden');
            document.getElementById('waitingSection').classList.add('hidden');
            document.getElementById('filesSection').classList.remove('hidden');
            document.getElementById('usersTab').classList.remove('bg-green-500/20');
            document.getElementById('waitingTab').classList.remove('bg-green-500/20');
            document.getElementById('filesTab').classList.add('bg-green-500/20');
            loadFiles();
        });
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('neo_user');
            window.location.href = '/secure-file-transfer/login.html';
        });
        
        checkAdmin();
    </script>
</body>
</html>
