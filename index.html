<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure File Transfer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="container mx-auto px-4 py-12 max-w-2xl">
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <h1 class="text-3xl font-bold text-center mb-8">Secure File Transfer</h1>
            
            <div id="uploadArea" class="border-2 border-dashed border-gray-300 rounded-lg p-8 text-center cursor-pointer hover:border-blue-500 transition">
                <p class="text-gray-600">Click or drag file here to upload</p>
                <p class="text-sm text-gray-400 mt-2">Max 5GB • Secure • Expires in 30 days</p>
                <input type="file" id="fileInput" class="hidden" />
            </div>

            <div id="progressArea" class="hidden mt-4">
                <div class="bg-gray-200 rounded-full h-2">
                    <div id="progressBar" class="bg-blue-600 h-2 rounded-full transition-all" style="width: 0%"></div>
                </div>
                <p id="progressText" class="text-sm text-gray-600 mt-2 text-center">Uploading...</p>
            </div>

            <div id="resultArea" class="hidden mt-6">
                <div class="bg-green-50 border border-green-200 rounded-lg p-4">
                    <p class="text-green-800 font-semibold mb-2">✓ Ready to share</p>
                    <input type="text" id="shareLink" class="w-full p-2 border rounded-lg bg-white text-sm" readonly />
                    <button id="copyBtn" class="mt-3 w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition">Copy Link</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Your Cloudinary credentials - YOU NEED TO UPDATE THESE!
        const CLOUD_NAME = 'dmskjzsi1';  // ← CHANGE THIS
        const UPLOAD_PRESET = 'secure_uploads';      // We'll create this next

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const progressArea = document.getElementById('progressArea');
        const resultArea = document.getElementById('resultArea');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');

        uploadArea.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('border-blue-500');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('border-blue-500');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('border-blue-500');
            const file = e.dataTransfer.files[0];
            if (file) handleUpload(file);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleUpload(e.target.files[0]);
        });

        async function handleUpload(file) {
            if (file.size > 5 * 1024 * 1024 * 1024) {
                alert('File exceeds 5GB limit');
                return;
            }

            progressArea.classList.remove('hidden');
            resultArea.classList.add('hidden');

            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', UPLOAD_PRESET);
            formData.append('folder', 'secure-transfers');

            try {
                const xhr = new XMLHttpRequest();
                xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/upload`);

                xhr.upload.onprogress = (e) => {
                    if (e.lengthComputable) {
                        const percent = (e.loaded / e.total) * 100;
                        progressBar.style.width = `${percent}%`;
                        progressText.textContent = `Uploading: ${Math.round(percent)}%`;
                    }
                };

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const response = JSON.parse(xhr.responseText);
                        const shareUrl = window.location.origin + '/share.html?id=' + response.public_id;
                        document.getElementById('shareLink').value = shareUrl;
                        progressArea.classList.add('hidden');
                        resultArea.classList.remove('hidden');
                    } else {
                        alert('Upload failed. Please try again.');
                        progressArea.classList.add('hidden');
                    }
                };

                xhr.onerror = () => {
                    alert('Upload failed. Please try again.');
                    progressArea.classList.add('hidden');
                };

                xhr.send(formData);
            } catch (error) {
                alert('Upload failed: ' + error.message);
                progressArea.classList.add('hidden');
            }
        }

        document.getElementById('copyBtn').addEventListener('click', () => {
            const link = document.getElementById('shareLink');
            link.select();
            document.execCommand('copy');
            alert('Link copied to clipboard!');
        });
    </script>
</body>
</html>
