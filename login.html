<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEO TRANSFER | Login</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --matrix-green: #00ff41; }
        body {
            background: linear-gradient(135deg, #050805 0%, #0a0f0a 100%);
            color: var(--matrix-green);
            font-family: 'Share Tech Mono', monospace;
        }
        .card {
            background: rgba(10, 15, 10, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid var(--matrix-green);
            border-radius: 1rem;
        }
        .input-field {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--matrix-green);
            color: var(--matrix-green);
            padding: 10px;
            border-radius: 8px;
            width: 100%;
            font-family: monospace;
        }
        .btn-primary {
            background: linear-gradient(135deg, #00ff41 0%, #00cc33 100%);
            color: #000;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }
        .glow-text {
            text-shadow: 0 0 10px var(--matrix-green);
        }
    </style>
</head>
<body>
    <div class="container mx-auto px-4 py-12 max-w-md">
        <div class="card p-8">
            <div class="text-center mb-6">
                <div class="text-4xl mb-2">🔐</div>
                <h1 class="text-2xl font-bold glow-text" style="font-family: 'Orbitron', monospace;">NEO TRANSFER</h1>
                <p class="text-xs opacity-70 mt-2">SECURE_ACCESS_PORTAL</p>
            </div>
            
            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
                <button id="loginTab" class="flex-1 py-2 rounded border border-green-500 bg-green-500/20">LOGIN</button>
                <button id="waitingTab" class="flex-1 py-2 rounded border border-green-500">WAITING LIST</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4">
                    <label class="block mb-2 text-sm">EMAIL_ADDRESS:</label>
                    <input type="email" id="loginEmail" class="input-field" placeholder="user@example.com">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm">PASSWORD:</label>
                    <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
                </div>
                <button id="loginBtn" class="btn-primary">🔓 LOGIN</button>
            </div>
            
            <!-- Waiting List Form -->
            <div id="waitingForm" class="hidden">
                <div class="mb-4">
                    <label class="block mb-2 text-sm">EMAIL_ADDRESS:</label>
                    <input type="email" id="waitingEmail" class="input-field" placeholder="user@example.com">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm">FULL_NAME:</label>
                    <input type="text" id="waitingName" class="input-field" placeholder="John Doe">
                </div>
                <button id="joinWaitingBtn" class="btn-primary">📝 JOIN WAITING LIST</button>
            </div>
            
            <div id="messageArea" class="mt-4 hidden">
                <div id="messageText" class="text-sm text-center p-3 rounded"></div>
            </div>
        </div>
        
        <div class="mt-6 text-center text-xs opacity-50 font-mono">
            <p>█▓▒░ SECURE_CONNECTION ░▒▓█ | █▓▒░ EU_HOSTED ░▒▓█</p>
        </div>
    </div>

    <script>
        // ========== SUPABASE CONFIGURATION ==========
        const supabaseUrl = 'https://heijzhvqyfjrhcmxagxs.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlaWp6aHZxeWZqcmhjbXhhZ3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODQzMzIsImV4cCI6MjA5MTE2MDMzMn0.BRnW1xP8rXuat4D4HWKxvN0a_5UurauVnNVJorvVAoo';  // ← PASTE YOUR ANON KEY HERE
        
        // Initialize Supabase with a different variable name to avoid conflicts
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        
        // ========== HELPER FUNCTIONS ==========
        function showMessage(msg, isError = false) {
            const area = document.getElementById('messageArea');
            const text = document.getElementById('messageText');
            text.textContent = msg;
            text.className = isError ? 'text-red-400' : 'text-green-400';
            area.classList.remove('hidden');
            setTimeout(() => area.classList.add('hidden'), 4000);
        }
        
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // ========== TAB SWITCHING ==========
        document.getElementById('loginTab').addEventListener('click', () => {
            document.getElementById('loginTab').classList.add('bg-green-500/20');
            document.getElementById('waitingTab').classList.remove('bg-green-500/20');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('waitingForm').classList.add('hidden');
        });
        
        document.getElementById('waitingTab').addEventListener('click', () => {
            document.getElementById('waitingTab').classList.add('bg-green-500/20');
            document.getElementById('loginTab').classList.remove('bg-green-500/20');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('waitingForm').classList.remove('hidden');
        });
        
        // ========== LOGIN HANDLER ==========
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!email || !password) {
                showMessage('Please enter email and password', true);
                return;
            }
            
            showMessage('>_ AUTHENTICATING...', false);
            
            try {
                // Query Supabase for user
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email);
                
                if (error) {
                    console.error('Supabase error:', error);
                    showMessage('Authentication error. Please try again.', true);
                    return;
                }
                
                if (!data || data.length === 0) {
                    showMessage('Access Denied: No account found. Join the waiting list.', true);
                    return;
                }
                
                const user = data[0];
                
                if (user.status !== 'active') {
                    showMessage('Account pending approval. You will receive an email when activated.', true);
                    return;
                }
                
                // Verify password
                const hashedInput = await hashPassword(password);
                
                if (hashedInput !== user.password_hash) {
                    showMessage('Invalid password', true);
                    return;
                }
                
                // Update last login
                await supabaseClient
                    .from('users')
                    .update({ last_login: new Date().toISOString() })
                    .eq('email', email);
                
                // Store session
                localStorage.setItem('neo_user', JSON.stringify({
                    email: user.email,
                    name: user.full_name,
                    role: user.role,
                    loggedIn: true,
                    loginTime: new Date().toISOString()
                }));
                
                showMessage('✓ ACCESS GRANTED! Redirecting...', false);
                setTimeout(() => {
                    window.location.href = '/secure-file-transfer/';
                }, 1000);
                
            } catch (error) {
                console.error('Login error:', error);
                showMessage('Login failed. Please try again.', true);
            }
        });
        
        // ========== WAITING LIST HANDLER ==========
        document.getElementById('joinWaitingBtn').addEventListener('click', async () => {
            const email = document.getElementById('waitingEmail').value.trim();
            const name = document.getElementById('waitingName').value.trim();
            
            if (!email || !name) {
                showMessage('Please enter email and name', true);
                return;
            }
            
            // Validate email format
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('Please enter a valid email address', true);
                return;
            }
            
            showMessage('>_ SUBMITTING TO WAITING LIST...', false);
            
            try {
                // Check if already on waiting list
                const { data: existing } = await supabaseClient
                    .from('waiting_list')
                    .select('email')
                    .eq('email', email);
                
                if (existing && existing.length > 0) {
                    showMessage('You are already on the waiting list!', true);
                    return;
                }
                
                // Get position
                const { data: positionData } = await supabaseClient
                    .from('waiting_list')
                    .select('position')
                    .order('position', { ascending: false })
                    .limit(1);
                
                const newPosition = (positionData && positionData[0]?.position) ? positionData[0].position + 1 : 1;
                
                // Add to waiting list
                const { error } = await supabaseClient
                    .from('waiting_list')
                    .insert([{
                        email: email,
                        name: name,
                        position: newPosition,
                        status: 'pending'
                    }]);
                
                if (error) {
                    console.error('Insert error:', error);
                    showMessage('Error joining waiting list', true);
                } else {
                    showMessage(`✓ Added to waiting list! Position: #${newPosition}. You will be notified when access is available.`, false);
                    document.getElementById('waitingEmail').value = '';
                    document.getElementById('waitingName').value = '';
                }
                
            } catch (error) {
                console.error('Waiting list error:', error);
                showMessage('Failed to join waiting list', true);
            }
        });
        
        // ========== CHECK EXISTING SESSION ==========
        const savedUser = localStorage.getItem('neo_user');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user.loggedIn) {
                    const loginTime = new Date(user.loginTime);
                    const now = new Date();
                    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
                    
                    // Session expires after 24 hours
                    if (hoursDiff < 24) {
                        window.location.href = '/secure-file-transfer/';
                    } else {
                        localStorage.removeItem('neo_user');
                    }
                }
            } catch(e) {
                localStorage.removeItem('neo_user');
            }
        }
    </script>
</body>
</html>
