<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS TRANSFER | Secure File Transfer System</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="/secure-file-transfer/jarvis.css">
    
    <style>
        /* Additional JARVIS-specific styles */
        .jarvis-glow-text {
            text-shadow: 0 0 20px var(--jarvis-blue), 0 0 40px var(--jarvis-glow);
        }
        
        .jarvis-circle {
            width: 100px;
            height: 100px;
            border: 2px solid var(--jarvis-blue);
            border-radius: 50%;
            position: relative;
            margin: 0 auto 20px;
            animation: rotate 10s linear infinite;
        }
        
        .jarvis-circle::before {
            content: '⟁';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 40px;
            color: var(--jarvis-blue);
            animation: pulse 2s infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .jarvis-voice-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 40px;
        }
        
        .voice-bar {
            width: 3px;
            background: var(--jarvis-blue);
            animation: voice 1s infinite;
        }
        
        @keyframes voice {
            0%, 100% { height: 10px; }
            50% { height: 30px; }
        }
    </style>
</head>
<body class="jarvis-theme">
    <!-- Particle Effect Container -->
    <div id="particles" class="jarvis-particles"></div>
    
    <div class="container mx-auto px-4 py-12 max-w-md relative z-10">
        <!-- JARVIS Circle Logo -->
        <div class="jarvis-circle"></div>
        
        <!-- Main Card -->
        <div class="jarvis-card p-8 jarvis-float">
            <div class="text-center mb-6">
                <h1 class="text-3xl font-bold jarvis-glow-text" style="font-family: 'Orbitron', monospace;">JARVIS TRANSFER</h1>
                <div class="jarvis-voice-wave mt-4">
                    <div class="voice-bar" style="animation-delay: 0s"></div>
                    <div class="voice-bar" style="animation-delay: 0.2s"></div>
                    <div class="voice-bar" style="animation-delay: 0.4s"></div>
                    <div class="voice-bar" style="animation-delay: 0.6s"></div>
                    <div class="voice-bar" style="animation-delay: 0.8s"></div>
                </div>
                <p class="text-xs opacity-70 mt-2 jarvis-typing" style="width: 200px; margin: 0 auto;">>_ SECURE_ACCESS_PROTOCOL</p>
            </div>
            
            <!-- Status Indicators -->
            <div class="flex justify-center gap-3 mb-6">
                <div class="jarvis-status">
                    <span class="jarvis-led"></span>
                    <span>SYSTEM_ONLINE</span>
                </div>
                <div class="jarvis-status">
                    <span class="jarvis-led"></span>
                    <span>ENCRYPTION_ACTIVE</span>
                </div>
            </div>
            
            <!-- Tabs -->
            <div class="flex gap-2 mb-6">
                <button id="loginTab" class="flex-1 py-2 rounded-lg border border-jarvis-blue bg-jarvis-blue/20 jarvis-glow-text">LOGIN</button>
                <button id="waitingTab" class="flex-1 py-2 rounded-lg border border-jarvis-blue">WAITING LIST</button>
            </div>
            
            <!-- Login Form -->
            <div id="loginForm">
                <div class="mb-4">
                    <label class="block mb-2 text-sm opacity-70">>_ EMAIL_ADDRESS</label>
                    <input type="email" id="loginEmail" class="jarvis-input" placeholder="user@example.com">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm opacity-70">>_ PASSWORD</label>
                    <input type="password" id="loginPassword" class="jarvis-input" placeholder="••••••••">
                </div>
                <button id="loginBtn" class="jarvis-btn jarvis-btn-primary w-full">
                    <span id="loginText">🔓 INITIALIZE_LOGIN</span>
                    <span id="loginSpinner" class="hidden">⏳ PROCESSING...</span>
                </button>
            </div>
            
            <!-- Waiting List Form -->
            <div id="waitingForm" class="hidden">
                <div class="mb-4">
                    <label class="block mb-2 text-sm opacity-70">>_ EMAIL_ADDRESS</label>
                    <input type="email" id="waitingEmail" class="jarvis-input" placeholder="user@example.com">
                </div>
                <div class="mb-4">
                    <label class="block mb-2 text-sm opacity-70">>_ FULL_NAME</label>
                    <input type="text" id="waitingName" class="jarvis-input" placeholder="John Doe">
                </div>
                <button id="joinWaitingBtn" class="jarvis-btn w-full">📝 REQUEST_ACCESS</button>
            </div>
            
            <div id="messageArea" class="mt-4 hidden">
                <div id="messageText" class="text-sm text-center p-3 rounded bg-jarvis-blue/10 border border-jarvis-blue/30"></div>
            </div>
        </div>
        
        <!-- Footer -->
        <div class="mt-6 text-center text-xs opacity-50 font-mono">
            <p>█▓▒░ JARVIS_SECURE_TRANSFER ░▒▓█ | █▓▒░ EU_HOSTED ░▒▓█ | █▓▒░ ENCRYPTED ░▒▓█</p>
        </div>
    </div>

    <script>
        // Supabase config
        const supabaseUrl = 'https://heijzhvqyfjrhcmxagxs.supabase.co';
        const supabaseAnonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhlaWp6aHZxeWZqcmhjbXhhZ3hzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1ODQzMzIsImV4cCI6MjA5MTE2MDMzMn0.BRnW1xP8rXuat4D4HWKxvN0a_5UurauVnNVJorvVAoo';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseAnonKey);
        
        // Particle effect
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 4 + 's';
                particle.style.animationDuration = 3 + Math.random() * 2 + 's';
                particle.style.width = particle.style.height = (2 + Math.random() * 3) + 'px';
                container.appendChild(particle);
            }
        }
        
        createParticles();
        
        function showMessage(msg, isError = false) {
            const area = document.getElementById('messageArea');
            const text = document.getElementById('messageText');
            text.textContent = msg;
            text.className = isError ? 'text-red-400' : 'text-green-400';
            area.classList.remove('hidden');
            setTimeout(() => area.classList.add('hidden'), 4000);
        }
        
        async function hashPassword(password) {
            const encoder = new TextEncoder();
            const data = encoder.encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }
        
        // Tab switching
        document.getElementById('loginTab').addEventListener('click', () => {
            document.getElementById('loginTab').classList.add('bg-jarvis-blue/20');
            document.getElementById('waitingTab').classList.remove('bg-jarvis-blue/20');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('waitingForm').classList.add('hidden');
        });
        
        document.getElementById('waitingTab').addEventListener('click', () => {
            document.getElementById('waitingTab').classList.add('bg-jarvis-blue/20');
            document.getElementById('loginTab').classList.remove('bg-jarvis-blue/20');
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('waitingForm').classList.remove('hidden');
        });
        
        // Login handler
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('loginText');
            const btnSpinner = document.getElementById('loginSpinner');
            
            if (!email || !password) {
                showMessage('Please enter email and password', true);
                return;
            }
            
            btnText.classList.add('hidden');
            btnSpinner.classList.remove('hidden');
            btn.disabled = true;
            
            try {
                const { data, error } = await supabaseClient
                    .from('users')
                    .select('*')
                    .eq('email', email);
                
                if (error || !data || data.length === 0) {
                    showMessage('Access Denied: No account found', true);
                    return;
                }
                
                const user = data[0];
                if (user.status !== 'active') {
                    showMessage('Account pending approval', true);
                    return;
                }
                
                const hashedInput = await hashPassword(password);
                if (hashedInput !== user.password_hash) {
                    showMessage('Invalid password', true);
                    return;
                }
                
                await supabaseClient
                    .from('users')
                    .update({ last_login: new Date().toISOString() })
                    .eq('email', email);
                
                localStorage.setItem('neo_user', JSON.stringify({
                    id: user.id,
                    email: user.email,
                    name: user.full_name,
                    role: user.role,
                    loggedIn: true,
                    loginTime: new Date().toISOString()
                }));
                
                showMessage('✓ ACCESS GRANTED! Welcome back, ' + (user.full_name || user.email));
                setTimeout(() => {
                    window.location.href = '/secure-file-transfer/';
                }, 1500);
                
            } catch (error) {
                showMessage('Login failed', true);
            } finally {
                btnText.classList.remove('hidden');
                btnSpinner.classList.add('hidden');
                btn.disabled = false;
            }
        });
        
        // Waiting list handler
        document.getElementById('joinWaitingBtn').addEventListener('click', async () => {
            const email = document.getElementById('waitingEmail').value.trim();
            const name = document.getElementById('waitingName').value.trim();
            
            if (!email || !name) {
                showMessage('Please enter email and name', true);
                return;
            }
            
            try {
                const { data: existing } = await supabaseClient
                    .from('waiting_list')
                    .select('email')
                    .eq('email', email);
                
                if (existing && existing.length > 0) {
                    showMessage('Already on waiting list', true);
                    return;
                }
                
                const { data: positionData } = await supabaseClient
                    .from('waiting_list')
                    .select('position')
                    .order('position', { ascending: false })
                    .limit(1);
                
                const newPosition = (positionData && positionData[0]?.position) ? positionData[0].position + 1 : 1;
                
                const { error } = await supabaseClient
                    .from('waiting_list')
                    .insert([{ email, name, position: newPosition, status: 'pending' }]);
                
                if (error) {
                    showMessage('Error joining waiting list', true);
                } else {
                    showMessage(`✓ Request received! Position: #${newPosition}`);
                    document.getElementById('waitingEmail').value = '';
                    document.getElementById('waitingName').value = '';
                }
            } catch (error) {
                showMessage('Failed to join waiting list', true);
            }
        });
        
        // Check existing session
        const savedUser = localStorage.getItem('neo_user');
        if (savedUser) {
            try {
                const user = JSON.parse(savedUser);
                if (user.loggedIn) {
                    const loginTime = new Date(user.loginTime);
                    const now = new Date();
                    const hoursDiff = (now - loginTime) / (1000 * 60 * 60);
                    if (hoursDiff < 24) {
                        window.location.href = '/secure-file-transfer/';
                    } else {
                        localStorage.removeItem('neo_user');
                    }
                }
            } catch(e) {
                localStorage.removeItem('neo_user');
            }
        }
    </script>
</body>
</html>
